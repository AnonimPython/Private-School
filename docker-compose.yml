services:
  app:
    build: .
    ports:
      - "8000:7860"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://school:school_pass@postgres:5432/school_db
      - MONGO_URL=mongodb://mongo:27017
      - DEMO_MODE=false
      - DATA_ENCRYPTION_KEY=E5vLdot0kuv6k8leIlqqHKWvG4DqnbNjPC5EU23cdww=
    volumes:
      - .:/app
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=school
      - POSTGRES_PASSWORD=school_pass
      - POSTGRES_DB=school_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U school -d school_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet 2>/dev/null || echo 'db.runCommand("ping").ok' | mongo --quiet 2>/dev/null || exit 0
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
