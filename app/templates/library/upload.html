{% extends "base.html" %}
{% block page_title %}Загрузить материал{% endblock %}

{% block content %}
<div class="card" style="max-width:560px">
    <div class="card-header">
        <h3 class="card-title">Загрузить учебный материал</h3>
    </div>
    {% if error %}
    <div class="alert alert-error" style="margin-bottom:1rem">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/library/upload" enctype="multipart/form-data">
        <div class="form-group">
            <label>Название</label>
            <input type="text" name="title" class="form-control" required placeholder="Например: Учебник математики 5 класс">
        </div>
        <div class="form-group">
            <label>Описание (необязательно)</label>
            <textarea name="description" class="form-control" placeholder="Краткое описание материала" rows="3"></textarea>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Класс (необязательно)</label>
                <select name="class_id" class="form-control">
                    <option value="">Для всех классов</option>
                    {% for c in classes %}
                    <option value="{{ c.id }}">{{ c.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Предмет (необязательно)</label>
                <select name="subject_id" class="form-control">
                    <option value="">Все предметы</option>
                    {% for s in subjects %}
                    <option value="{{ s.id }}">{{ s.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>PDF файл</label>
            <input type="file" name="file" class="form-control" accept=".pdf" required style="padding:0.375rem">
        </div>
        <div class="btn-group">
            <button type="submit" class="btn btn-primary">Загрузить</button>
            <a href="/library" class="btn btn-outline">Отмена</a>
        </div>
    </form>
</div>
<style>
@media (max-width: 886px) {
  .form-group { margin-bottom: 0.6rem; }
  .card[style*="max-width:560px"] { padding: 1rem; }
}
@media (max-width: 743px) {
  .form-group label { font-size: 0.85rem; }
  .form-control { font-size: 0.85rem; }
  .btn-group { flex-direction: column; }
  .btn-group .btn { width: 100%; text-align: center; }
}
@media (max-width: 492px) {
  .card[style*="max-width:560px"] { padding: 0.75rem; }
}
@media (max-width: 430px) {
  .card[style*="max-width:560px"] { max-width: 100% !important; padding: 0.5rem; }
  .form-row { grid-template-columns: 1fr; }
}
</style>
{% endblock %}
