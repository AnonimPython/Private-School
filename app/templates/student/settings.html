{% extends "base.html" %}
{% block page_title %}Настройки{% endblock %}

{% block content %}
<div class="card" style="max-width:560px;margin:0 auto">
    <div class="card-header">
        <h3 class="card-title">Настройки профиля</h3>
    </div>
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    {% if success %}
    <div class="alert alert-success">{{ success }}</div>
    {% endif %}

    <form method="POST" action="/student/settings">
        <div class="form-group">
            <label>Логин</label>
            <input type="text" class="form-control" value="{{ user.username }}" disabled style="color:var(--text-muted)">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Новый пароль</label>
                <input type="password" name="new_password" class="form-control" placeholder="Оставьте пустым чтобы не менять">
            </div>
            <div class="form-group">
                <label>Подтверждение пароля</label>
                <input type="password" name="confirm_password" class="form-control" placeholder="Повторите пароль">
            </div>
        </div>

        <div class="btn-group" style="margin-top:1rem">
            <button type="submit" class="btn btn-primary">Сохранить</button>
        </div>
    </form>
</div>
<style>
@media (max-width: 886px) {
  .card[style*="max-width:560px"] { max-width: 95% !important; }
}
@media (max-width: 743px) {
  .card[style*="max-width:560px"] { max-width: 100% !important; }
  .form-row { grid-template-columns: 1fr; }
}
@media (max-width: 492px) {
  .form-group label { font-size: 0.85rem; }
  .form-control { font-size: 0.85rem; padding: 0.4rem 0.6rem; }
}
@media (max-width: 430px) {
  .card[style*="max-width:560px"] { max-width: 100% !important; }
  .form-row { grid-template-columns: 1fr; }
  .form-control { font-size: 0.7rem; padding: 0.3rem 0.4rem; }
  .form-group label { font-size: 0.75rem; }
  .btn-group .btn { font-size: 0.65rem; padding: 0.3rem 0.45rem; }
}
@media (max-width: 390px) {
  .btn-group .btn { font-size: 0.8rem; padding: 0.35rem 0.75rem; }
}
</style>
{% endblock %}
