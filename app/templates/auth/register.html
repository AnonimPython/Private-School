{% extends "base.html" %}
{% block page_title %}Создание пользователя{% endblock %}

{% block content %}
<div class="card" style="max-width:600px;margin:0 auto">
    <div class="card-header">
        <h2 class="card-title">Создать пользователя</h2>
    </div>
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    {% if success %}
    <div class="alert alert-success">{{ success }}</div>
    {% endif %}
    <form method="POST" action="/register">
        <div class="form-row">
            <div class="form-group">
                <label>Email *</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Пароль *</label>
                <input type="password" name="password" class="form-control" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Фамилия *</label>
                <input type="text" name="last_name" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Имя *</label>
                <input type="text" name="first_name" class="form-control" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Отчество</label>
                <input type="text" name="middle_name" class="form-control">
            </div>
            <div class="form-group">
                <label>Роль</label>
                <select name="role" class="form-control">
                    <option value="student">Ученик</option>
                    <option value="teacher">Учитель</option>
                    <option value="admin">Администратор</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>Телефон</label>
            <input type="text" name="phone" class="form-control" placeholder="+7 (999) 123-45-67">
        </div>
        <button type="submit" class="btn btn-primary">Создать</button>
    </form>
</div>
<style>
@media (max-width: 886px) {
  .card[style*="max-width:600px"] { max-width: 540px; }
}
@media (max-width: 743px) {
  .form-row { grid-template-columns: 1fr; }
}
@media (max-width: 492px) {
  .card[style*="max-width:600px"] { max-width: 100% !important; }
  .card-header h2 { font-size: 1.2rem; }
}
@media (max-width: 430px) {
  .card[style*="max-width:600px"] { max-width: 100% !important; }
  .form-row { grid-template-columns: 1fr; }
  .form-control { font-size: 0.7rem; padding: 0.3rem 0.4rem; }
  .btn.btn-primary { font-size: 0.65rem; padding: 0.3rem 0.45rem; }
}
@media (max-width: 390px) {
  .card-header h2 { font-size: 1.1rem; }
}
</style>
{% endblock %}
