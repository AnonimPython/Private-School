<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ APP_NAME }} — Ошибка сервера</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; font-family: var(--font); }
        body {
            background: linear-gradient(135deg, #f97316 0%, #dc2626 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(255,255,255,0.05) 0%, transparent 50%),
                        radial-gradient(circle at 70% 50%, rgba(255,255,255,0.05) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(1deg); }
            66% { transform: translate(-20px, 20px) rotate(-1deg); }
        }
        .error-card {
            background: color-mix(in srgb, var(--bg-card) 95%, transparent);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 3rem 4rem;
            text-align: center;
            max-width: 480px;
            width: 100%;
            position: relative;
            z-index: 1;
            box-shadow: var(--shadow-lg);
            animation: cardIn 0.6s ease both;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .error-code {
            font-size: 8rem;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, #f97316, #dc2626);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.25rem;
            letter-spacing: -0.05em;
        }
        .error-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            display: block;
        }
        .error-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 0.5rem;
        }
        .error-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            line-height: 1.5;
        }
        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 2rem;
            background: linear-gradient(135deg, #f97316, #dc2626);
            color: var(--white);
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            text-decoration: none;
            transition: transform .2s, box-shadow .2s;
            box-shadow: 0 4px 15px rgba(249,115,22,0.4);
        }
        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(249,115,22,0.5);
        }
        .btn-home svg {
            transition: transform .2s;
        }
        .btn-home:hover svg {
            transform: translateX(-3px);
        }
        .theme-toggle-500 {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: color-mix(in srgb, var(--bg-card) 20%, transparent);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid color-mix(in srgb, var(--border) 30%, transparent);
            width: 40px;
            height: 40px;
            cursor: pointer;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            transition: background .15s;
        }
        .theme-toggle-500:hover { background: color-mix(in srgb, var(--bg-card) 30%, transparent); }
        .theme-toggle-500 svg { width: 20px; height: 20px; color: var(--white); }
        .sun-icon { display: none; }
        .moon-icon { display: none; }
        [data-theme="dark"] .sun-icon { display: block; }
        [data-theme="dark"] .moon-icon { display: none; }
        [data-theme="light"] .sun-icon { display: none; }
        [data-theme="light"] .moon-icon { display: block; }

        [data-theme="dark"] .error-card { background: color-mix(in srgb, var(--bg-card) 95%, transparent); }
        [data-theme="dark"] .error-title { color: var(--text); }
        [data-theme="dark"] .error-desc { color: var(--text-secondary); }

        @media (max-width: 886px) {
            .error-card { padding: 2.5rem 3rem; max-width: 440px; }
            .error-code { font-size: 6.5rem; }
        }
        @media (max-width: 743px) {
            .error-card { padding: 2rem 2rem; max-width: 100%; }
            .error-code { font-size: 5.5rem; }
        }
        @media (max-width: 492px) {
            .error-card { padding: 2rem 1.75rem; }
            .error-code { font-size: 5rem; }
        }
@media (max-width: 430px) {
  .error-card { padding: 1.5rem 1.25rem; max-width: 100%; border-radius: 12px; }
  .error-code { font-size: 4rem; }
  .error-title { font-size: 0.95rem; }
  .error-desc { font-size: 0.75rem; }
  .btn-home { padding: 0.5rem 1.25rem; font-size: 0.8rem; }
}
        @media (max-width: 390px) {
            .error-card { padding: 1.5rem 1.25rem; }
            .error-code { font-size: 4rem; }
            .theme-toggle-500 { top: 0.5rem; right: 0.5rem; width: 34px; height: 34px; }
        }
        @media (max-width: 375px) {
            .error-card { padding: 1.25rem 1rem; }
            .error-code { font-size: 3.5rem; }
        }
    </style>
</head>
<body>
    <button id="themeToggle500" class="theme-toggle-500" title="Сменить тему">
        <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>

    <div class="error-card">
        <span class="error-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </span>
        <div class="error-code">500</div>
        <div class="error-title">Что-то пошло не так</div>
        <div class="error-desc">Произошла внутренняя ошибка сервера.<br>Мы уже работаем над её исправлением.<br>Пожалуйста, попробуйте позже.</div>
        <a href="/" class="btn-home">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            На главную
        </a>
    </div>

    <script>
        const html = document.documentElement;
        const toggle = document.getElementById('themeToggle500');
        const saved = localStorage.getItem('theme');
        if (saved) html.setAttribute('data-theme', saved);
        toggle.addEventListener('click', () => {
            const cur = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', cur);
            localStorage.setItem('theme', cur);
        });
    </script>
</body>
</html>
