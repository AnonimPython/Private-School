{% extends "base.html" %}
<!--* create_other.html — Форма создания сотрудника (охрана, уборка, столовая) / Staff creation form (security, cleaning, cafeteria) -->
{% block page_title %}Создание сотрудника{% endblock %}

{% block content %}
<!--/ ===== Карточка создания сотрудника / Staff creation card ===== -->
<div class="card" style="max-width:720px;margin:0 auto">
    <div class="card-header">
        <h3 class="card-title">Новый сотрудник</h3>
    </div>
    <!--! ===== Блок ошибок / Error block ===== -->
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    <form method="POST" enctype="multipart/form-data">
        <!--/ ===== Основные данные / Basic info ===== -->
        <div class="form-row">
            <div class="form-group">
                <label>Email *</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Пароль *</label>
                <input type="password" name="password" class="form-control" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Фамилия *</label>
                <input type="text" name="last_name" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Имя *</label>
                <input type="text" name="first_name" class="form-control" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Отчество</label>
                <input type="text" name="middle_name" class="form-control">
            </div>
            <div class="form-group">
                <label>Телефон</label>
                <input type="text" name="phone" class="form-control" placeholder="+7 (999) 123-45-67">
            </div>
        </div>
        <div class="form-group">
            <label>Должность *</label>
            <select name="staff_position" class="form-control" required>
                <option value="">— Выберите —</option>
                <option value="охранник">Охранник</option>
                <option value="уборщица">Уборщица</option>
                <option value="кухарка">Кухарка / Повар</option>
                <option value="уборщик">Уборщик</option>
                <option value="другое">Другое</option>
            </select>
        </div>
        <!--/ ===== Загрузка фото / Photo upload ===== -->
        <div class="form-group">
            <label>Фотография</label>
            <input type="file" name="photo" accept="image/*" class="form-control" style="padding:0.375rem 0.5rem">
            <small style="color:var(--text-muted);font-size:0.8rem">Рекомендуемый размер: 200×200px</small>
        </div>

        <!--* ===== Кнопки отправки / Submit buttons ===== -->
        <div class="btn-group" style="margin-top:1rem">
            <button type="submit" class="btn btn-primary">Создать сотрудника</button>
            <a href="/admin/users" class="btn btn-outline">Отмена</a>
        </div>
    </form>
</div>
<style>
@media (max-width: 886px) {
  .form-row { gap: 0.75rem; }
}
@media (max-width: 743px) {
  .form-row { grid-template-columns: 1fr; }
}
@media (max-width: 492px) {
  .form-row .btn { font-size: 0.8rem; padding: 0.35rem 0.6rem; }
}
@media (max-width: 430px) {
  .card[style*="max-width"] { max-width: 100% !important; }
  .form-row { grid-template-columns: 1fr; gap: 0.5rem; }
}
</style>
{% endblock %}
