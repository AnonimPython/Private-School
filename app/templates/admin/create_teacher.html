{% extends "base.html" %}
<!--* create_teacher.html — Форма создания нового учителя с профессиональными данными / New teacher creation form with professional data -->
{% block page_title %}Создание учителя{% endblock %}

{% block content %}
<!--/ ===== Карточка создания учителя / Teacher creation card ===== -->
<div class="card" style="max-width:720px;margin:0 auto">
    <div class="card-header">
        <h3 class="card-title">Новый учитель</h3>
    </div>
    <!--! ===== Блок ошибок / Error block ===== -->
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    <form method="POST" enctype="multipart/form-data">
        <!--/ ===== Основные данные / Basic info ===== -->
        <div class="form-row">
            <div class="form-group">
                <label>Email *</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Пароль *</label>
                <input type="password" name="password" class="form-control" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Фамилия *</label>
                <input type="text" name="last_name" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Имя *</label>
                <input type="text" name="first_name" class="form-control" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Отчество</label>
                <input type="text" name="middle_name" class="form-control">
            </div>
            <div class="form-group">
                <label>Телефон</label>
                <input type="text" name="phone" class="form-control" placeholder="+7 (999) 123-45-67">
            </div>
        </div>

        <!--/ ===== Профессиональные данные / Professional data ===== -->
        <h4 style="margin:1.25rem 0 0.75rem;color:var(--accent)">Профессиональные данные</h4>
        <div class="form-row">
            <div class="form-group">
                <label>Номер трудовой книжки</label>
                <input type="text" name="labor_book_number" class="form-control" placeholder="ТК-1234567">
            </div>
            <div class="form-group">
                <label>Стаж работы (лет)</label>
                <input type="number" name="experience_years" class="form-control" min="0" max="70">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Зарплата (руб/мес)</label>
                <input type="number" name="salary_monthly" class="form-control" min="0" step="0.01" placeholder="50000">
            </div>
            <div class="form-group">
                <label>Часов в неделю</label>
                <input type="number" name="hours_per_week" class="form-control" min="0" step="0.5" placeholder="40">
            </div>
        </div>

        <!--/ ===== Загрузка фото / Photo upload ===== -->
        <div class="form-group">
            <label>Фотография</label>
            <input type="file" name="photo" accept="image/*" class="form-control" style="padding:0.375rem 0.5rem">
            <small style="color:var(--text-muted);font-size:0.8rem">Рекомендуемый размер: 200×200px</small>
        </div>

        <!--? ===== Калькулятор ставки / Hourly rate calculator ===== -->
        <div id="hourlyRateDisplay" style="margin:0.75rem 0;padding:0.5rem 0.75rem;background:var(--bg-secondary,#f0f4ff);border-radius:0.375rem;font-size:0.85rem;display:none">
            Ставка: <strong id="hourlyRateValue">0</strong> руб/час
            <small style="color:var(--text-muted);display:block">Рассчитано: зарплата ÷ (часы × 4.33)</small>
        </div>
        <script>
        (function(){
            var salaryInput = document.querySelector('[name="salary_monthly"]');
            var hoursInput = document.querySelector('[name="hours_per_week"]');
            var display = document.getElementById('hourlyRateDisplay');
            var valueEl = document.getElementById('hourlyRateValue');
            function calcRate(){
                var s = parseFloat(salaryInput.value) || 0;
                var h = parseFloat(hoursInput.value) || 0;
                if(s > 0 && h > 0){
                    var rate = s / (h * 4.33);
                    valueEl.textContent = rate.toFixed(2);
                    display.style.display = 'block';
                } else {
                    display.style.display = 'none';
                }
            }
            salaryInput.addEventListener('input', calcRate);
            hoursInput.addEventListener('input', calcRate);
            //* Run on load if pre-filled
            calcRate();
        })();
        </script>
        <!--* ===== Кнопки отправки / Submit buttons ===== -->
        <div class="btn-group" style="margin-top:1rem">
            <button type="submit" class="btn btn-primary">Создать учителя</button>
            <a href="/admin/users" class="btn btn-outline">Отмена</a>
        </div>
    </form>
</div>
<style>
@media (max-width: 912px) {
  .form-row { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 886px) {
  .form-row { gap: 0.75rem; }
}
@media (max-width: 743px) {
  .form-row { grid-template-columns: 1fr; }
}
@media (max-width: 492px) {
  .form-row .btn { font-size: 0.8rem; padding: 0.35rem 0.6rem; }
  .card-header h3 { font-size: 0.95rem; }
}
@media (max-width: 430px) {
  .card[style*="max-width:720px"] { max-width: 100% !important; }
  .form-row { grid-template-columns: 1fr; }
  .form-control { font-size: 0.7rem; padding: 0.3rem 0.4rem; }
  .btn-group .btn { font-size: 0.65rem; padding: 0.3rem 0.45rem; }
}
@media (max-width: 390px) {
  .card-header h3 { font-size: 1rem; }
}
</style>
{% endblock %}
